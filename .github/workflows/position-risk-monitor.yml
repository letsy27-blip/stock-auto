name: Position risk monitor

on:
  workflow_dispatch:
  schedule:
    # 평일 한국시간 09:00~15:30. 스크립트에서도 정규장 여부를 다시 확인한다.
    - cron: "*/5 0-6 * * 1-5"

permissions:
  contents: read

concurrency:
  group: hongstock-market-automation
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    env:
      KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
      KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
      KIS_BASE_URL: ${{ secrets.KIS_BASE_URL }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check whether positions exist
        id: positions
        shell: bash
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          count=$(python <<'PY'
          import json
          import os
          import urllib.parse
          import urllib.request

          url = os.environ.get("SUPABASE_URL", "").rstrip("/")
          key = os.environ.get("SUPABASE_SERVICE_ROLE_KEY", "")
          if not url or not key:
              raise RuntimeError("Supabase central-store secrets are required")
          query = urllib.parse.urlencode({
              "key": "eq.auto_strategy_state",
              "select": "value",
              "limit": "1",
          })
          request = urllib.request.Request(
              f"{url}/rest/v1/hongstock_state?{query}",
              headers={"apikey": key, "Authorization": f"Bearer {key}"},
          )
          with urllib.request.urlopen(request, timeout=20) as response:
              rows = json.load(response)
          records = (((rows[0] if rows else {}).get("value") or {})
                     .get("tables") or {}).get("auto_strategy_positions") or []
          count = len(records)
          print(count)
          PY
          )
          echo "count=$count"
          if [ "$count" -gt 0 ]; then
            echo "has_positions=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_positions=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-python@v5
        if: steps.positions.outputs.has_positions == 'true'
        with:
          python-version: "3.13"
          cache: pip

      - if: steps.positions.outputs.has_positions == 'true'
        run: pip install -r requirements.txt
      - if: steps.positions.outputs.has_positions == 'true'
        run: python risk_monitor.py
