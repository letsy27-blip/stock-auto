name: Korean market collector

on:
  workflow_dispatch:
  schedule:
    # UTC 00:00/30~06:00/30 = 한국 시간 평일 09:00/30~15:00/30
    # 장 시작부터 마감까지 30분 단위로 실행한다.
    - cron: "0,30 0-6 * * 1-5"

permissions:
  contents: read

concurrency:
  group: hongstock-market-automation
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
      KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
      KIS_BASE_URL: ${{ secrets.KIS_BASE_URL }}
      KIS_ACCOUNT_NO: ${{ secrets.KIS_ACCOUNT_NO }}
      KIS_ACCOUNT_CODE: ${{ secrets.KIS_ACCOUNT_CODE }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      OPENDART_API_KEY: ${{ secrets.OPENDART_API_KEY }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      GEMINI_MODEL: gemini-2.5-flash
      # 무료 한도를 보호한다. 핵심 후보만 Gemini로 정밀 평가하고 나머지는 로컬 1차 분석을 쓴다.
      GEMINI_MAX_CALLS_PER_RUN: "8"
      GEMINI_PRIORITY_STOCKS_PER_RUN: "8"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore authoritative Supabase database
        run: |
          python - <<'PY'
          from central_store import restore_database_snapshot
          print(f"Restored central database: {restore_database_snapshot('stock_data.db')}")
          PY

      - name: Collect market data once
        run: python main.py --once
