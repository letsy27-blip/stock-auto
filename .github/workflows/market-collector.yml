name: Korean market collector

on:
  workflow_dispatch:
  schedule:
    # UTC 00:05/35~06:05/35 = 한국 시간 평일 09:05/35~15:05/35
    # 정각 혼잡을 피하면서 장중 30분 단위로 실행한다.
    - cron: "5,35 0-6 * * 1-5"

permissions:
  contents: write

concurrency:
  group: korean-market-collector
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      # Python의 datetime.now()가 장중 기준인 한국 시간을 기록하도록 고정한다.
      TZ: Asia/Seoul
      KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
      KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
      KIS_BASE_URL: ${{ secrets.KIS_BASE_URL }}
      KIS_ACCOUNT_NO: ${{ secrets.KIS_ACCOUNT_NO }}
      KIS_ACCOUNT_CODE: ${{ secrets.KIS_ACCOUNT_CODE }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GEMINI_MODEL: gemini-2.5-flash
      # 무료 한도를 보호한다. 핵심 후보만 Gemini로 정밀 평가하고 나머지는 로컬 1차 분석을 쓴다.
      GEMINI_MAX_CALLS_PER_RUN: "8"
      GEMINI_PRIORITY_STOCKS_PER_RUN: "8"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Collect market data once
        run: python main.py --once

      - name: Verify dashboard database was updated
        run: |
          if git diff --quiet -- stock_data.db; then
            echo "Collection finished without updating stock_data.db. Check the Collect market data once log."
            exit 1
          fi

      - name: Verify recommendation scores are current
        run: |
          python - <<'PY'
          import sqlite3
          import sys
          from datetime import datetime
          from zoneinfo import ZoneInfo

          today = datetime.now(ZoneInfo("Asia/Seoul")).strftime("%Y-%m-%d")
          with sqlite3.connect("stock_data.db") as conn:
              row = conn.execute(
                  'SELECT MAX("최종갱신일자") FROM "score"'
              ).fetchone()

          latest = row[0] if row else None
          if latest != today:
              print(f"Recommendation score is stale: {latest!r}; expected {today}")
              sys.exit(1)
          print(f"Recommendation score date verified: {latest}")
          PY

      - name: Commit updated data
        run: |
          if git diff --quiet -- stock_data.db; then
            echo "No database changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add stock_data.db
          git commit -m "chore: update market data"
          git push
